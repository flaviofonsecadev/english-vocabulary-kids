<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Fundo suave -->
  <rect width="128" height="128" rx="16" fill="#eaf4ff"/>

  <!-- Nuvem principal -->
  <g>
    <circle cx="54" cy="56" r="24" fill="#cfd8dc"/>
    <circle cx="84" cy="60" r="20" fill="#b0bec5"/>
    <circle cx="38" cy="64" r="16" fill="#cfd8dc"/>
    <rect x="28" y="64" width="76" height="18" rx="9" fill="#b0bec5"/>
  </g>

  <!-- Flocos de neve (asteriscos) -->
  <g stroke="#64b5f6" stroke-width="4" stroke-linecap="round" fill="none">
    <!-- Floco 1 -->
    <line x1="36" y1="92" x2="36" y2="104"/>
    <line x1="30" y1="98" x2="42" y2="98"/>
    <line x1="31" y1="93" x2="41" y2="103"/>
    <line x1="41" y1="93" x2="31" y2="103"/>

    <!-- Floco 2 -->
    <line x1="64" y1="96" x2="64" y2="108"/>
    <line x1="58" y1="102" x2="70" y2="102"/>
    <line x1="59" y1="97" x2="69" y2="107"/>
    <line x1="69" y1="97" x2="59" y2="107"/>

    <!-- Floco 3 -->
    <line x1="92" y1="92" x2="92" y2="104"/>
    <line x1="86" y1="98" x2="98" y2="98"/>
    <line x1="87" y1="93" x2="97" y2="103"/>
    <line x1="97" y1="93" x2="87" y2="103"/>
  </g>

  <!-- Pontos leves de neve -->
  <g fill="#90caf9" opacity="0.9">
    <circle cx="48" cy="110" r="3"/>
    <circle cx="72" cy="114" r="3"/>
    <circle cx="100" cy="112" r="3"/>
  </g>
</svg>
