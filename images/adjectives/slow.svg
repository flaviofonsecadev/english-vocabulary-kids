<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#e8f5e8" stroke="#4caf50" stroke-width="2"/>
  
  <!-- Slow turtle -->
  <!-- Shell -->
  <ellipse cx="100" cy="105" rx="30" ry="20" fill="#8bc34a"/>
  
  <!-- Shell pattern -->
  <path d="M75 95 Q100 85 125 95 Q125 105 100 115 Q75 105 75 95" fill="#689f38"/>
  <line x1="85" y1="95" x2="85" y2="115" stroke="#558b2f" stroke-width="1"/>
  <line x1="100" y1="90" x2="100" y2="120" stroke="#558b2f" stroke-width="1"/>
  <line x1="115" y1="95" x2="115" y2="115" stroke="#558b2f" stroke-width="1"/>
  <path d="M80 100 Q90 95 100 100 Q110 95 120 100" stroke="#558b2f" stroke-width="1" fill="none"/>
  <path d="M80 110 Q90 105 100 110 Q110 105 120 110" stroke="#558b2f" stroke-width="1" fill="none"/>
  
  <!-- Head -->
  <ellipse cx="70" cy="100" rx="8" ry="6" fill="#8bc34a"/>
  
  <!-- Eyes -->
  <circle cx="67" cy="98" r="2" fill="#333"/>
  <circle cx="73" cy="98" r="2" fill="#333"/>
  <circle cx="68" cy="97" r="0.5" fill="#fff"/>
  <circle cx="74" cy="97" r="0.5" fill="#fff"/>
  
  <!-- Mouth -->
  <path d="M68 102 Q70 104 72 102" stroke="#333" stroke-width="1" fill="none"/>
  
  <!-- Legs (moving very slowly) -->
  <ellipse cx="85" cy="120" rx="4" ry="6" fill="#8bc34a"/>
  <ellipse cx="105" cy="125" rx="4" ry="6" fill="#8bc34a"/>
  <ellipse cx="95" cy="125" rx="4" ry="6" fill="#8bc34a"/>
  <ellipse cx="115" cy="120" rx="4" ry="6" fill="#8bc34a"/>
  
  <!-- Tail -->
  <ellipse cx="130" cy="105" rx="3" ry="2" fill="#8bc34a"/>
  
  <!-- Very slow movement trail (minimal) -->
  <circle cx="50" cy="110" r="1" fill="#c8e6c9" opacity="0.5"/>
  <circle cx="45" cy="108" r="0.8" fill="#c8e6c9" opacity="0.4"/>
  <circle cx="40" cy="106" r="0.6" fill="#c8e6c9" opacity="0.3"/>
  
  <!-- Snail for comparison (even slower) -->
  <ellipse cx="160" cy="140" rx="6" ry="4" fill="#8d6e63"/>
  <circle cx="155" cy="138" r="3" fill="#8d6e63"/>
  <circle cx="153" cy="137" r="1" fill="#333"/>
  <line x1="150" y1="136" x2="148" y2="134" stroke="#8d6e63" stroke-width="1"/>
  <line x1="150" y1="138" x2="148" y2="140" stroke="#8d6e63" stroke-width="1"/>
  <!-- Snail shell -->
  <circle cx="160" cy="138" r="4" fill="#a1887f"/>
  <path d="M158 136 Q160 134 162 136 Q162 138 160 140 Q158 140 158 138 Q158 136 158 136" 
        stroke="#8d6e63" stroke-width="1" fill="none"/>
  
  <!-- Clock showing slow time -->
  <circle cx="40" cy="60" r="15" fill="#fff" stroke="#333" stroke-width="2"/>
  <circle cx="40" cy="60" r="1" fill="#333"/>
  <!-- Clock hands moving very slowly -->
  <line x1="40" y1="60" x2="40" y2="50" stroke="#333" stroke-width="2"/>
  <line x1="40" y1="60" x2="45" y2="55" stroke="#333" stroke-width="1"/>
  <!-- Clock numbers -->
  <text x="38" y="50" font-family="Arial" font-size="6" fill="#333">12</text>
  <text x="48" y="63" font-family="Arial" font-size="6" fill="#333">3</text>
  <text x="38" y="73" font-family="Arial" font-size="6" fill="#333">6</text>
  <text x="30" y="63" font-family="Arial" font-size="6" fill="#333">9</text>
  
  <!-- "SLOW" text with emphasis -->
  <text x="130" y="50" font-family="Arial" font-size="16" fill="#558b2f" font-weight="bold">SLOW</text>
  
  <!-- Zzz symbols (sleepy/slow) -->
  <text x="120" y="80" font-family="Arial" font-size="12" fill="#9e9e9e">z</text>
  <text x="125" y="75" font-family="Arial" font-size="14" fill="#9e9e9e">z</text>
  <text x="130" y="70" font-family="Arial" font-size="16" fill="#9e9e9e">Z</text>
  
  <!-- Slow motion lines (very few and faint) -->
  <line x1="20" y1="100" x2="35" y2="100" stroke="#c8e6c9" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  <line x1="25" y1="110" x2="40" y2="110" stroke="#c8e6c9" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Grass growing (showing passage of time) -->
  <line x1="170" y1="170" x2="170" y2="160" stroke="#4caf50" stroke-width="2"/>
  <line x1="175" y1="175" x2="175" y2="165" stroke="#4caf50" stroke-width="2"/>
  <line x1="165" y1="175" x2="165" y2="168" stroke="#4caf50" stroke-width="2"/>
  <line x1="180" y1="170" x2="180" y2="162" stroke="#4caf50" stroke-width="2"/>
  
  <!-- Slow arrow -->
  <defs>
    <marker id="slow-arrow" markerWidth="8" markerHeight="6" 
            refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#558b2f"/>
    </marker>
  </defs>
  <line x1="140" y1="100" x2="155" y2="100" stroke="#558b2f" stroke-width="2" marker-end="url(#slow-arrow)" stroke-dasharray="3,3"/>
</svg>