<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#fff9c4" stroke="#ffc107" stroke-width="2"/>
  
  <!-- Happy face -->
  <!-- Main face circle -->
  <circle cx="100" cy="100" r="60" fill="#ffc107" stroke="#ff8f00" stroke-width="3"/>
  
  <!-- Eyes (happy/smiling eyes) -->
  <path d="M75 85 Q80 75 85 85" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M115 85 Q120 75 125 85" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Rosy cheeks -->
  <circle cx="65" cy="105" r="8" fill="#ff8a80" opacity="0.6"/>
  <circle cx="135" cy="105" r="8" fill="#ff8a80" opacity="0.6"/>
  
  <!-- Big smile -->
  <path d="M75 115 Q100 140 125 115" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Teeth showing in smile -->
  <path d="M85 122 Q100 135 115 122" fill="#fff"/>
  
  <!-- Small lines for extra happiness -->
  <line x1="90" y1="125" x2="90" y2="130" stroke="#333" stroke-width="1"/>
  <line x1="95" y1="127" x2="95" y2="132" stroke="#333" stroke-width="1"/>
  <line x1="100" y1="128" x2="100" y2="133" stroke="#333" stroke-width="1"/>
  <line x1="105" y1="127" x2="105" y2="132" stroke="#333" stroke-width="1"/>
  <line x1="110" y1="125" x2="110" y2="130" stroke="#333" stroke-width="1"/>
  
  <!-- Sparkles around the face for joy -->
  <text x="40" y="60" font-family="Arial" font-size="16" fill="#ffc107">✨</text>
  <text x="150" y="70" font-family="Arial" font-size="14" fill="#ffc107">✨</text>
  <text x="35" y="140" font-family="Arial" font-size="12" fill="#ffc107">✨</text>
  <text x="160" y="130" font-family="Arial" font-size="18" fill="#ffc107">✨</text>
  <text x="50" y="180" font-family="Arial" font-size="10" fill="#ffc107">✨</text>
  <text x="145" y="175" font-family="Arial" font-size="12" fill="#ffc107">✨</text>
  
  <!-- Hearts floating around -->
  <text x="30" y="100" font-family="Arial" font-size="14" fill="#e91e63">💛</text>
  <text x="165" y="95" font-family="Arial" font-size="12" fill="#e91e63">💛</text>
  <text x="45" y="45" font-family="Arial" font-size="10" fill="#e91e63">💛</text>
  
  <!-- Radiating happiness lines -->
  <line x1="100" y1="25" x2="100" y2="35" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
  <line x1="135" y1="35" x2="130" y2="43" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
  <line x1="165" y1="65" x2="157" y2="70" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
  <line x1="175" y1="100" x2="165" y2="100" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
  <line x1="165" y1="135" x2="157" y2="130" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
  <line x1="135" y1="165" x2="130" y2="157" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="175" x2="100" y2="165" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
  <line x1="65" y1="165" x2="70" y2="157" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
  <line x1="35" y1="135" x2="43" y2="130" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
  <line x1="25" y1="100" x2="35" y2="100" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
  <line x1="35" y1="65" x2="43" y2="70" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
  <line x1="65" y1="35" x2="70" y2="43" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Additional joy elements -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#ffc107" stroke-width="1" opacity="0.3"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#ffc107" stroke-width="1" opacity="0.2"/>
