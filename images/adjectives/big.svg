<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#e8f5e8" stroke="#4caf50" stroke-width="2"/>
  
  <!-- Large elephant to represent "big" -->
  <!-- Body -->
  <ellipse cx="100" cy="120" rx="45" ry="30" fill="#9e9e9e"/>
  
  <!-- Head -->
  <circle cx="100" cy="80" r="25" fill="#9e9e9e"/>
  
  <!-- Trunk -->
  <path d="M100 105 Q85 115 75 130 Q70 140 75 150 Q80 155 85 150 Q90 145 95 140" 
        stroke="#9e9e9e" stroke-width="12" fill="none" stroke-linecap="round"/>
  
  <!-- Ears -->
  <ellipse cx="75" cy="75" rx="15" ry="20" fill="#757575" transform="rotate(-20 75 75)"/>
  <ellipse cx="125" cy="75" rx="15" ry="20" fill="#757575" transform="rotate(20 125 75)"/>
  
  <!-- Eyes -->
  <circle cx="90" cy="75" r="3" fill="#333"/>
  <circle cx="110" cy="75" r="3" fill="#333"/>
  <circle cx="91" cy="74" r="1" fill="#fff"/>
  <circle cx="111" cy="74" r="1" fill="#fff"/>
  
  <!-- Legs -->
  <rect x="70" y="145" width="12" height="25" rx="6" fill="#9e9e9e"/>
  <rect x="90" y="145" width="12" height="25" rx="6" fill="#9e9e9e"/>
  <rect x="110" y="145" width="12" height="25" rx="6" fill="#9e9e9e"/>
  <rect x="130" y="145" width="12" height="25" rx="6" fill="#9e9e9e"/>
  
  <!-- Feet -->
  <ellipse cx="76" cy="172" rx="8" ry="4" fill="#616161"/>
  <ellipse cx="96" cy="172" rx="8" ry="4" fill="#616161"/>
  <ellipse cx="116" cy="172" rx="8" ry="4" fill="#616161"/>
  <ellipse cx="136" cy="172" rx="8" ry="4" fill="#616161"/>
  
  <!-- Tail -->
  <line x1="145" y1="120" x2="160" y2="125" stroke="#9e9e9e" stroke-width="4" stroke-linecap="round"/>
  <circle cx="160" cy="125" r="3" fill="#757575"/>
  
  <!-- Small mouse for size comparison -->
  <ellipse cx="40" cy="165" rx="6" ry="4" fill="#8d6e63"/>
  <circle cx="35" cy="163" r="3" fill="#8d6e63"/>
  <circle cx="33" cy="162" r="1" fill="#333"/>
  <line x1="30" y1="162" x2="25" y2="160" stroke="#8d6e63" stroke-width="1"/>
  <circle cx="46" cy="165" r="1" fill="#8d6e63"/>
  
  <!-- Size comparison arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff5722"/>
    </marker>
  </defs>
  
  <!-- Arrow pointing to elephant -->
  <line x1="170" y1="60" x2="140" y2="80" stroke="#ff5722" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="175" y="58" font-family="Arial" font-size="12" fill="#ff5722" font-weight="bold">BIG</text>
  
  <!-- Arrow pointing to mouse -->
  <line x1="20" y1="140" x2="35" y2="155" stroke="#ff5722" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="5" y="138" font-family="Arial" font-size="10" fill="#ff5722">small</text>
</svg>