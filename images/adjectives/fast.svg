<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  
  <!-- Fast running cheetah -->
  <!-- Body (stretched for running) -->
  <ellipse cx="110" cy="110" rx="25" ry="12" fill="#ffc107" transform="rotate(-10 110 110)"/>
  
  <!-- Head -->
  <circle cx="85" cy="95" r="12" fill="#ffc107"/>
  
  <!-- Spots on cheetah -->
  <circle cx="100" cy="105" r="2" fill="#ff8f00"/>
  <circle cx="115" cy="108" r="2" fill="#ff8f00"/>
  <circle cx="125" cy="112" r="2" fill="#ff8f00"/>
  <circle cx="105" cy="115" r="2" fill="#ff8f00"/>
  <circle cx="90" cy="100" r="1.5" fill="#ff8f00"/>
  <circle cx="95" cy="90" r="1.5" fill="#ff8f00"/>
  
  <!-- Ears -->
  <ellipse cx="78" cy="88" rx="3" ry="5" fill="#ffb74d" transform="rotate(-20 78 88)"/>
  <ellipse cx="92" cy="88" rx="3" ry="5" fill="#ffb74d" transform="rotate(20 92 88)"/>
  
  <!-- Eyes (focused) -->
  <circle cx="82" cy="93" r="2" fill="#333"/>
  <circle cx="88" cy="93" r="2" fill="#333"/>
  <circle cx="83" cy="92" r="0.5" fill="#fff"/>
  <circle cx="89" cy="92" r="0.5" fill="#fff"/>
  
  <!-- Nose -->
  <circle cx="85" cy="98" r="1" fill="#333"/>
  
  <!-- Legs in running position -->
  <!-- Front legs -->
  <line x1="95" y1="120" x2="90" y2="135" stroke="#ffc107" stroke-width="4" stroke-linecap="round"/>
  <line x1="105" y1="122" x2="110" y2="140" stroke="#ffc107" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Back legs -->
  <line x1="120" y1="118" x2="130" y2="130" stroke="#ffc107" stroke-width="4" stroke-linecap="round"/>
  <line x1="130" y1="115" x2="145" y2="125" stroke="#ffc107" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Paws -->
  <circle cx="90" cy="135" r="2" fill="#ff8f00"/>
  <circle cx="110" cy="140" r="2" fill="#ff8f00"/>
  <circle cx="130" cy="130" r="2" fill="#ff8f00"/>
  <circle cx="145" cy="125" r="2" fill="#ff8f00"/>
  
  <!-- Tail (flowing behind) -->
  <path d="M135 110 Q150 105 160 115 Q165 120 160 125" 
        stroke="#ffc107" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- Speed lines behind the cheetah -->
  <line x1="40" y1="90" x2="70" y2="90" stroke="#ff5722" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="35" y1="100" x2="65" y2="100" stroke="#ff5722" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="30" y1="110" x2="60" y2="110" stroke="#ff5722" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="25" y1="120" x2="55" y2="120" stroke="#ff5722" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="20" y1="130" x2="50" y2="130" stroke="#ff5722" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  
  <!-- More speed lines -->
  <line x1="45" y1="80" x2="70" y2="85" stroke="#ff5722" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="40" y1="140" x2="65" y2="135" stroke="#ff5722" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="35" y1="150" x2="60" y2="145" stroke="#ff5722" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Dust clouds -->
  <ellipse cx="50" cy="140" rx="8" ry="4" fill="#d7ccc8" opacity="0.6"/>
  <ellipse cx="40" cy="145" rx="6" ry="3" fill="#d7ccc8" opacity="0.5"/>
  <ellipse cx="60" cy="135" rx="5" ry="2" fill="#d7ccc8" opacity="0.4"/>
  
  <!-- Motion blur effect -->
  <ellipse cx="110" cy="110" rx="30" ry="15" fill="none" stroke="#ffc107" stroke-width="1" opacity="0.3" transform="rotate(-10 110 110)"/>
  <ellipse cx="115" cy="110" rx="35" ry="18" fill="none" stroke="#ffc107" stroke-width="1" opacity="0.2" transform="rotate(-10 115 110)"/>
  
  <!-- Speed indicator -->
  <text x="150" y="60" font-family="Arial" font-size="14" fill="#ff5722" font-weight="bold">FAST!</text>
  
  <!-- Arrow showing direction -->
  <defs>
    <marker id="speed-arrow" markerWidth="12" markerHeight="8" 
            refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#ff5722"/>
    </marker>
  </defs>
  <line x1="150" y1="70" x2="170" y2="70" stroke="#ff5722" stroke-width="3" marker-end="url(#speed-arrow)"/>
</svg>