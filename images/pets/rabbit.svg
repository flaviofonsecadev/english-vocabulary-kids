<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <g fill="#F5F5F5">
    <!-- Corpo -->
    <ellipse cx="50" cy="65" rx="18" ry="12"/>
    <!-- Cabeça -->
    <circle cx="50" cy="45" r="12"/>
    <!-- Orelhas longas -->
    <ellipse cx="45" cy="30" rx="5" ry="15" transform="rotate(-10 45 30)"/>
    <ellipse cx="55" cy="30" rx="5" ry="15" transform="rotate(10 55 30)"/>
    <!-- Orelhas internas -->
    <ellipse cx="45" cy="30" rx="3" ry="12" fill="#FFB6C1" transform="rotate(-10 45 30)"/>
    <ellipse cx="55" cy="30" rx="3" ry="12" fill="#FFB6C1" transform="rotate(10 55 30)"/>
    <!-- Focinho -->
    <ellipse cx="50" cy="50" rx="4" ry="2" fill="#FFB6C1"/>
    <!-- Olhos -->
    <circle cx="45" cy="42" r="1.5" fill="black"/>
    <circle cx="55" cy="42" r="1.5" fill="black"/>
    <!-- Bigodes -->
    <line x1="47" y1="52" x2="40" y2="50" stroke="black" stroke-width="0.5"/>
    <line x1="47" y1="54" x2="40" y2="54" stroke="black" stroke-width="0.5"/>
    <line x1="53" y1="52" x2="60" y2="50" stroke="black" stroke-width="0.5"/>
    <line x1="53" y1="54" x2="60" y2="54" stroke="black" stroke-width="0.5"/>
    <!-- Patas traseiras -->
    <ellipse cx="40" cy="75" rx="6" ry="4"/>
    <ellipse cx="60" cy="75" rx="6" ry="4"/>
    <!-- Rabinho -->
    <circle cx="65" cy="60" r="4" fill="white"/>
  </g>
</svg>