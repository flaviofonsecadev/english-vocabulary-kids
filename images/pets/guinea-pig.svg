<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <g fill="#A0522D">
    <!-- Corpo -->
    <ellipse cx="50" cy="60" rx="20" ry="12"/>
    <!-- Cabeça -->
    <ellipse cx="50" cy="45" rx="12" ry="8"/>
    <!-- Orelhas -->
    <ellipse cx="43" cy="40" rx="3" ry="2" fill="#8B4513"/>
    <ellipse cx="57" cy="40" rx="3" ry="2" fill="#8B4513"/>
    <!-- Olhos -->
    <circle cx="45" cy="43" r="1.5" fill="black"/>
    <circle cx="55" cy="43" r="1.5" fill="black"/>
    <!-- Focinho -->
