    <!-- Bigodes -->
    <line x1="47" y1="50" x2="40" y2="48" stroke="black" stroke-width="0.5"/>
    <line x1="47" y1="52" x2="40" y2="52" stroke="black" stroke-width="0.5"/>
    <line x1="53" y1="50" x2="60" y2="48" stroke="black" stroke-width="0.5"/>
    <line x1="53" y1="52" x2="60" y2="52" stroke="black" stroke-width="0.5"/>
    <!-- Patas dianteiras -->
    <ellipse cx="40" cy="65" rx="4" ry="2"/>
    <ellipse cx="60" cy="65" rx="4" ry="2"/>
    <!-- Patas traseiras -->
    <ellipse cx="35" cy="70" rx="4" ry="2"/>
    <ellipse cx="65" cy="70" rx="4" ry="2"/>
    <!-- Rabinho -->
    <ellipse cx="70" cy="55" rx="6" ry="2" transform="rotate(30 70 55)"/>
