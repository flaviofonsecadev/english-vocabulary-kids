<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Círculo de fundo para o ícone -->
    <circle cx="50" cy="50" r="48" fill="#F5F5DC" stroke="#DEB887" stroke-width="2"/>

    <!-- Cadeira -->
    <g id="chair" stroke="#8B4513" stroke-width="4" fill="#D2B48C">
        <!-- Encosto -->
        <rect x="30" y="20" width="40" height="30"/>
        <!-- Assento -->
        <rect x="25" y="50" width="50" height="10"/>

        <!-- Pernas -->
        <g stroke-linecap="round">
            <!-- Perna Traseira Esquerda -->
            <line x1="32" y1="50" x2="32" y2="80"/>
            <!-- Perna Traseira Direita -->
            <line x1="68" y1="50" x2="68" y2="80"/>
            <!-- Perna Frontal Esquerda -->
            <line x1="28" y1="60" x2="28" y2="85"/>
            <!-- Perna Frontal Direita -->
            <line x1="72" y1="60" x2="72" y2="85"/>
        </g>

        <!-- Detalhes do encosto -->
        <g stroke-width="2" stroke="#A0522D">
            <line x1="40" y1="25" x2="40" y2="45"/>
            <line x1="50" y1="25" x2="50" y2="45"/>
            <line x1="60" y1="25" x2="60" y2="45"/>
        </g>
    </g>

    <!-- Almofada (opcional) -->
    <rect x="28" y="45" width="44" height="8" fill="#DC143C" rx="2">
        <animate attributeName="height" values="8;10;8" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="y" values="45;44;45" dur="2s" repeatCount="indefinite"/>
    </rect>

    <!-- Sombra -->
    <ellipse cx="50" cy="88" rx="25" ry="5" fill="#000000" opacity="0.1"/>
</svg>