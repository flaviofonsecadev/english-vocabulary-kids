<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Círculo de fundo para o ícone -->
    <circle cx="50" cy="50" r="48" fill="#ADD8E6" stroke="#87CEEB" stroke-width="2"/>

    <!-- Estrada -->
    <rect x="0" y="70" width="100" height="30" fill="#696969"/>
    <path d="M 0 80 H 100" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="10 5"/>

    <!-- Carro -->
    <g id="car">
        <!-- Corpo do carro -->
        <path d="M 10 70 L 20 50 H 70 L 80 70 Z" fill="#FF4136" stroke="#000000" stroke-width="1"/>
        <!-- Teto -->
        <path d="M 25 50 H 65 L 60 40 H 30 Z" fill="#FF4136" stroke="#000000" stroke-width="1"/>
        
        <!-- Janelas -->
        <g fill="#87CEFA">
            <path d="M 32 42 H 58 L 62 48 H 28 Z"/>
        </g>

        <!-- Rodas -->
        <g fill="#000000">
            <circle id="wheel-left" cx="30" cy="70" r="8"/>
            <circle id="wheel-right" cx="70" cy="70" r="8"/>
        </g>
        <g fill="#D3D3D3">
            <circle cx="30" cy="70" r="3"/>
            <circle cx="70" cy="70" r="3"/>
        </g>

        <!-- Farol -->
        <circle cx="15" cy="65" r="3" fill="#FFFF00"/>
    </g>

    <!-- Animação de movimento -->
    <animateTransform 
        xlink:href="#car"
        attributeName="transform" 
        type="translate" 
        from="-100 0" 
        to="100 0" 
        dur="5s" 
        repeatCount="indefinite" />

    <!-- Animação das rodas -->
    <animateTransform 
        xlink:href="#wheel-left"
        attributeName="transform" 
        type="rotate" 
        from="0 30 70" 
        to="360 30 70" 
        dur="1s" 
        repeatCount="indefinite" />
    <animateTransform 
        xlink:href="#wheel-right"
        attributeName="transform" 
        type="rotate" 
        from="0 70 70" 
        to="360 70 70" 
        dur="1s" 
        repeatCount="indefinite" />
</svg>