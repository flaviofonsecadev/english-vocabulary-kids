<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Círculo de fundo para o ícone (céu) -->
    <circle cx="50" cy="50" r="48" fill="#87CEEB" stroke="#4682B4" stroke-width="2"/>

    <!-- Grama -->
    <rect x="0" y="70" width="100" height="30" fill="#90EE90"/>

    <!-- Casa -->
    <g id="house">
        <!-- Paredes -->
        <rect x="25" y="40" width="50" height="40" fill="#F5DEB3" stroke="#DEB887" stroke-width="2"/>

        <!-- Telhado -->
        <polygon points="20,40 80,40 50,20" fill="#CD5C5C" stroke="#8B0000" stroke-width="2"/>

        <!-- Porta -->
        <rect x="42" y="60" width="16" height="20" fill="#A0522D"/>
        <circle cx="54" cy="70" r="1.5" fill="#FFD700"/>

        <!-- Janela -->
        <g fill="#87CEFA">
            <rect x="30" y="50" width="15" height="15"/>
            <rect x="55" y="50" width="15" height="15"/>
        </g>
        <line x1="30" y1="57.5" x2="45" y2="57.5" stroke="#FFFFFF" stroke-width="1"/>
        <line x1="37.5" y1="50" x2="37.5" y2="65" stroke="#FFFFFF" stroke-width="1"/>
        <line x1="55" y1="57.5" x2="70" y2="57.5" stroke="#FFFFFF" stroke-width="1"/>
        <line x1="62.5" y1="50" x2="62.5" y2="65" stroke="#FFFFFF" stroke-width="1"/>

        <!-- Chaminé -->
        <rect x="65" y="25" width="8" height="15" fill="#BC8F8F"/>
    </g>

    <!-- Fumaça da chaminé (animada) -->
    <g id="smoke" fill="#D3D3D3" opacity="0.8">
        <circle cx="69" cy="22" r="3">
            <animate attributeName="cy" from="22" to="10" dur="3s" repeatCount="indefinite"/>
            <animate attributeName="opacity" from="0.8" to="0" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="72" cy="25" r="4">
            <animate attributeName="cy" from="25" to="12" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
            <animate attributeName="opacity" from="0.8" to="0" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
        </circle>
    </g>

    <!-- Sol -->
    <circle cx="85" cy="20" r="8" fill="#FFD700">
        <animateTransform 
            attributeName="transform" 
            type="rotate" 
            from="0 85 20" 
            to="360 85 20" 
            dur="10s" 
            repeatCount="indefinite"/>
    </circle>
</svg>