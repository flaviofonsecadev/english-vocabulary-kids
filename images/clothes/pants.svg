<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#e1f5fe" stroke="#0277bd" stroke-width="2"/>
  
  <!-- Pants -->
  <!-- Waistband -->
  <rect x="75" y="60" width="50" height="8" rx="4" fill="#1976d2"/>
  
  <!-- Belt loops -->
  <rect x="80" y="58" width="2" height="6" fill="#0d47a1"/>
  <rect x="90" y="58" width="2" height="6" fill="#0d47a1"/>
  <rect x="100" y="58" width="2" height="6" fill="#0d47a1"/>
  <rect x="110" y="58" width="2" height="6" fill="#0d47a1"/>
  <rect x="118" y="58" width="2" height="6" fill="#0d47a1"/>
  
  <!-- Left leg -->
  <rect x="75" y="68" width="20" height="90" rx="3" fill="#2196f3"/>
  
  <!-- Right leg -->
  <rect x="105" y="68" width="20" height="90" rx="3" fill="#2196f3"/>
  
  <!-- Crotch area -->
  <path d="M95 68 Q100 75 105 68 L105 85 Q100 90 95 85 Z" fill="#1976d2"/>
  
  <!-- Pockets -->
  <!-- Left front pocket -->
  <path d="M80 75 Q85 73 90 75 L90 85 Q85 87 80 85 Z" fill="#1565c0"/>
  <line x1="80" y1="75" x2="90" y2="75" stroke="#0d47a1" stroke-width="1"/>
  
  <!-- Right front pocket -->
  <path d="M110 75 Q115 73 120 75 L120 85 Q115 87 110 85 Z" fill="#1565c0"/>
  <line x1="110" y1="75" x2="120" y2="75" stroke="#0d47a1" stroke-width="1"/>
  
  <!-- Back pockets (visible from side) -->
  <rect x="77" y="95" width="8" height="10" rx="1" fill="#1565c0"/>
  <rect x="115" y="95" width="8" height="10" rx="1" fill="#1565c0"/>
  
  <!-- Seam lines -->
  <line x1="75" y1="70" x2="75" y2="155" stroke="#1565c0" stroke-width="1"/>
  <line x1="95" y1="70" x2="95" y2="155" stroke="#1565c0" stroke-width="1"/>
  <line x1="105" y1="70" x2="105" y2="155" stroke="#1565c0" stroke-width="1"/>
  <line x1="125" y1="70" x2="125" y2="155" stroke="#1565c0" stroke-width="1"/>
  
  <!-- Hem at bottom -->
  <line x1="75" y1="155" x2="95" y2="155" stroke="#0d47a1" stroke-width="2"/>
  <line x1="105" y1="155" x2="125" y2="155" stroke="#0d47a1" stroke-width="2"/>
  
  <!-- Button and zipper -->
  <circle cx="100" cy="64" r="2" fill="#fff" stroke="#666" stroke-width="1"/>
  <line x1="100" y1="68" x2="100" y2="85" stroke="#666" stroke-width="2"/>
  
  <!-- Fabric texture -->
  <line x1="78" y1="75" x2="78" y2="150" stroke="#42a5f5" stroke-width="0.5" opacity="0.3"/>
  <line x1="85" y1="75" x2="85" y2="150" stroke="#42a5f5" stroke-width="0.5" opacity="0.3"/>
  <line x1="92" y1="75" x2="92" y2="150" stroke="#42a5f5" stroke-width="0.5" opacity="0.3"/>
  <line x1="108" y1="75" x2="108" y2="150" stroke="#42a5f5" stroke-width="0.5" opacity="0.3"/>
  <line x1="115" y1="75" x2="115" y2="150" stroke="#42a5f5" stroke-width="0.5" opacity="0.3"/>
  <line x1="122" y1="75" x2="122" y2="150" stroke="#42a5f5" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Shadow -->
  <ellipse cx="100" cy="170" rx="30" ry="6" fill="#000" opacity="0.2"/>
  
  <!-- Size label -->
  <rect x="130" y="80" width="10" height="6" fill="#fff" stroke="#666" stroke-width="1"/>
  <text x="132" y="85" font-family="Arial" font-size="5" fill="#333">32</text>
</svg>