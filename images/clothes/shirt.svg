<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
  
  <!-- T-shirt -->
  <!-- Main body of shirt -->
  <rect x="70" y="80" width="60" height="80" rx="5" fill="#2196f3"/>
  
  <!-- Sleeves -->
  <rect x="50" y="70" width="25" height="40" rx="12" fill="#2196f3"/>
  <rect x="125" y="70" width="25" height="40" rx="12" fill="#2196f3"/>
  
  <!-- Collar/neckline -->
  <path d="M85 80 Q100 70 115 80 Q115 85 100 90 Q85 85 85 80" fill="#1976d2"/>
  
  <!-- Shirt details -->
  <!-- Collar outline -->
  <path d="M85 80 Q100 70 115 80" stroke="#1565c0" stroke-width="2" fill="none"/>
  
  <!-- Seam lines -->
  <line x1="70" y1="85" x2="70" y2="155" stroke="#1976d2" stroke-width="1"/>
  <line x1="130" y1="85" x2="130" y2="155" stroke="#1976d2" stroke-width="1"/>
  
  <!-- Sleeve seams -->
  <line x1="75" y1="75" x2="75" y2="105" stroke="#1976d2" stroke-width="1"/>
  <line x1="125" y1="75" x2="125" y2="105" stroke="#1976d2" stroke-width="1"/>
  
  <!-- Hem at bottom -->
  <line x1="70" y1="155" x2="130" y2="155" stroke="#1976d2" stroke-width="2"/>
  
  <!-- Optional design element (stripes) -->
  <line x1="75" y1="100" x2="125" y2="100" stroke="#64b5f6" stroke-width="2" opacity="0.7"/>
  <line x1="75" y1="110" x2="125" y2="110" stroke="#64b5f6" stroke-width="2" opacity="0.7"/>
  <line x1="75" y1="120" x2="125" y2="120" stroke="#64b5f6" stroke-width="2" opacity="0.7"/>
  
  <!-- Hanger -->
  <line x1="100" y1="30" x2="100" y2="50" stroke="#8d6e63" stroke-width="3"/>
  <path d="M85 50 Q100 45 115 50" stroke="#8d6e63" stroke-width="3" fill="none"/>
  <circle cx="100" cy="30" r="3" fill="#8d6e63"/>
  
  <!-- Shadow -->
  <ellipse cx="100" cy="175" rx="35" ry="8" fill="#000" opacity="0.2"/>
  
  <!-- Size tag -->
  <rect x="135" y="90" width="12" height="8" fill="#fff" stroke="#666" stroke-width="1"/>
  <text x="138" y="96" font-family="Arial" font-size="6" fill="#333">M</text>
  
  <!-- Fabric texture lines -->
  <line x1="80" y1="85" x2="80" y2="150" stroke="#1e88e5" stroke-width="0.5" opacity="0.3"/>
  <line x1="90" y1="85" x2="90" y2="150" stroke="#1e88e5" stroke-width="0.5" opacity="0.3"/>
  <line x1="100" y1="95" x2="100" y2="150" stroke="#1e88e5" stroke-width="0.5" opacity="0.3"/>
  <line x1="110" y1="85" x2="110" y2="150" stroke="#1e88e5" stroke-width="0.5" opacity="0.3"/>
  <line x1="120" y1="85" x2="120" y2="150" stroke="#1e88e5" stroke-width="0.5" opacity="0.3"/>
</svg>