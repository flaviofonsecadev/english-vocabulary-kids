<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
  
  <!-- Dress -->
  <!-- Bodice/top part -->
  <path d="M80 70 Q100 60 120 70 L120 95 Q100 100 80 95 Z" fill="#e91e63"/>
  
  <!-- Skirt -->
  <path d="M80 95 Q100 100 120 95 L140 160 Q100 165 60 160 Z" fill="#f8bbd9"/>
  
  <!-- Sleeves -->
  <ellipse cx="70" cy="75" rx="8" ry="12" fill="#e91e63"/>
  <ellipse cx="130" cy="75" rx="8" ry="12" fill="#e91e63"/>
  
  <!-- Neckline -->
  <path d="M85 70 Q100 65 115 70" stroke="#c2185b" stroke-width="2" fill="none"/>
  
  <!-- Waistline -->
  <line x1="80" y1="95" x2="120" y2="95" stroke="#c2185b" stroke-width="2"/>
  
  <!-- Decorative elements -->
  <!-- Buttons down the front -->
  <circle cx="100" cy="75" r="2" fill="#fff"/>
  <circle cx="100" cy="82" r="2" fill="#fff"/>
  <circle cx="100" cy="89" r="2" fill="#fff"/>
  
  <!-- Floral pattern on skirt -->
  <circle cx="90" cy="120" r="3" fill="#fff" opacity="0.8"/>
  <circle cx="88" cy="118" r="1" fill="#ffeb3b"/>
  <circle cx="92" cy="118" r="1" fill="#ffeb3b"/>
  <circle cx="90" cy="122" r="1" fill="#ffeb3b"/>
  <circle cx="90" cy="116" r="1" fill="#ffeb3b"/>
  
  <circle cx="110" cy="135" r="3" fill="#fff" opacity="0.8"/>
  <circle cx="108" cy="133" r="1" fill="#ffeb3b"/>
  <circle cx="112" cy="133" r="1" fill="#ffeb3b"/>
  <circle cx="110" cy="137" r="1" fill="#ffeb3b"/>
  <circle cx="110" cy="131" r="1" fill="#ffeb3b"/>
  
  <circle cx="85" cy="145" r="3" fill="#fff" opacity="0.8"/>
  <circle cx="83" cy="143" r="1" fill="#ffeb3b"/>
  <circle cx="87" cy="143" r="1" fill="#ffeb3b"/>
  <circle cx="85" cy="147" r="1" fill="#ffeb3b"/>
  <circle cx="85" cy="141" r="1" fill="#ffeb3b"/>
  
  <!-- Hem -->
  <path d="M60 160 Q100 165 140 160" stroke="#c2185b" stroke-width="2" fill="none"/>
  
  <!-- Ruffle detail -->
  <path d="M65 155 Q75 150 85 155 Q95 150 105 155 Q115 150 125 155 Q135 150 135 155" 
        stroke="#e91e63" stroke-width="2" fill="none"/>
  
  <!-- Belt/sash -->
  <rect x="85" y="93" width="30" height="4" rx="2" fill="#9c27b0"/>
  <rect x="113" y="91" width="6" height="8" rx="1" fill="#9c27b0"/>
  
  <!-- Sleeve cuffs -->
  <ellipse cx="70" cy="82" rx="6" ry="3" fill="#c2185b"/>
  <ellipse cx="130" cy="82" rx="6" ry="3" fill="#c2185b"/>
  
  <!-- Collar detail -->
  <path d="M90 70 Q100 68 110 70" stroke="#fff" stroke-width="1.5" fill="none"/>
  
  <!-- Stitching details -->
  <line x1="82" y1="72" x2="82" y2="93" stroke="#c2185b" stroke-width="0.5"/>
  <line x1="118" y1="72" x2="118" y2="93" stroke="#c2185b" stroke-width="0.5"/>
  
  <!-- Shadow -->
  <ellipse cx="100" cy="175" rx="40" ry="8" fill="#000" opacity="0.2"/>
  
  <!-- Hanger -->
  <line x1="100" y1="30" x2="100" y2="50" stroke="#8d6e63" stroke-width="2"/>
  <path d="M85 50 Q100 45 115 50" stroke="#8d6e63" stroke-width="2" fill="none"/>
  <circle cx="100" cy="30" r="2" fill="#8d6e63"/>
  
  <!-- Size tag -->
  <rect x="125" y="100" width="8" height="6" fill="#fff" stroke="#666" stroke-width="0.5"/>
  <text x="127" y="104" font-family="Arial" font-size="4" fill="#333">S</text>
</svg>