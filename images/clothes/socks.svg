<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
  
  <!-- Pair of socks -->
  <!-- Left sock -->
  <!-- Leg part -->
  <rect x="65" y="60" width="15" height="50" rx="7" fill="#ff5722"/>
  
  <!-- Foot part -->
  <ellipse cx="72" cy="120" rx="12" ry="20" fill="#ff5722"/>
  
  <!-- Heel -->
  <ellipse cx="78" cy="110" rx="6" ry="8" fill="#e64a19"/>
  
  <!-- Toe -->
  <ellipse cx="72" cy="135" rx="8" ry="10" fill="#e64a19"/>
  
  <!-- Cuff -->
  <rect x="65" y="60" width="15" height="6" rx="2" fill="#d84315"/>
  
  <!-- Ribbing on cuff -->
  <line x1="67" y1="61" x2="78" y2="61" stroke="#bf360c" stroke-width="0.5"/>
  <line x1="67" y1="63" x2="78" y2="63" stroke="#bf360c" stroke-width="0.5"/>
  <line x1="67" y1="65" x2="78" y2="65" stroke="#bf360c" stroke-width="0.5"/>
  
  <!-- Right sock -->
  <!-- Leg part -->
  <rect x="120" y="60" width="15" height="50" rx="7" fill="#ff5722"/>
  
  <!-- Foot part -->
  <ellipse cx="128" cy="120" rx="12" ry="20" fill="#ff5722"/>
  
  <!-- Heel -->
  <ellipse cx="122" cy="110" rx="6" ry="8" fill="#e64a19"/>
  
  <!-- Toe -->
  <ellipse cx="128" cy="135" rx="8" ry="10" fill="#e64a19"/>
  
  <!-- Cuff -->
  <rect x="120" y="60" width="15" height="6" rx="2" fill="#d84315"/>
  
  <!-- Ribbing on cuff -->
  <line x1="122" y1="61" x2="133" y2="61" stroke="#bf360c" stroke-width="0.5"/>
  <line x1="122" y1="63" x2="133" y2="63" stroke="#bf360c" stroke-width="0.5"/>
  <line x1="122" y1="65" x2="133" y2="65" stroke="#bf360c" stroke-width="0.5"/>
  
  <!-- Stripes pattern -->
  <!-- Left sock stripes -->
  <rect x="65" y="75" width="15" height="2" fill="#fff" opacity="0.8"/>
  <rect x="65" y="85" width="15" height="2" fill="#fff" opacity="0.8"/>
  <rect x="65" y="95" width="15" height="2" fill="#fff" opacity="0.8"/>
  
  <!-- Right sock stripes -->
  <rect x="120" y="75" width="15" height="2" fill="#fff" opacity="0.8"/>
  <rect x="120" y="85" width="15" height="2" fill="#fff" opacity="0.8"/>
  <rect x="120" y="95" width="15" height="2" fill="#fff" opacity="0.8"/>
  
  <!-- Seam lines -->
  <!-- Left sock -->
  <line x1="72" y1="66" x2="72" y2="110" stroke="#d84315" stroke-width="0.5"/>
  <line x1="72" y1="120" x2="72" y2="145" stroke="#d84315" stroke-width="0.5"/>
  
  <!-- Right sock -->
  <line x1="128" y1="66" x2="128" y2="110" stroke="#d84315" stroke-width="0.5"/>
  <line x1="128" y1="120" x2="128" y2="145" stroke="#d84315" stroke-width="0.5"/>
  
  <!-- Fabric texture -->
  <!-- Left sock -->
  <line x1="68" y1="70" x2="68" y2="105" stroke="#ff7043" stroke-width="0.3" opacity="0.5"/>
  <line x1="76" y1="70" x2="76" y2="105" stroke="#ff7043" stroke-width="0.3" opacity="0.5"/>
  
  <!-- Right sock -->
  <line x1="123" y1="70" x2="123" y2="105" stroke="#ff7043" stroke-width="0.3" opacity="0.5"/>
  <line x1="131" y1="70" x2="131" y2="105" stroke="#ff7043" stroke-width="0.3" opacity="0.5"/>
  
  <!-- Shadows -->
  <ellipse cx="72" cy="150" rx="10" ry="3" fill="#000" opacity="0.3"/>
  <ellipse cx="128" cy="150" rx="10" ry="3" fill="#000" opacity="0.3"/>
  
  <!-- Size labels -->
  <rect x="58" y="68" width="6" height="4" fill="#fff" stroke="#333" stroke-width="0.3"/>
  <text x="59" y="71" font-family="Arial" font-size="3" fill="#333">M</text>
  
  <rect x="136" y="68" width="6" height="4" fill="#fff" stroke="#333" stroke-width="0.3"/>
  <text x="137" y="71" font-family="Arial" font-size="3" fill="#333">M</text>
  
  <!-- Laundry basket (background element) -->
  <rect x="40" y="160" width="120" height="25" rx="5" fill="#8d6e63" opacity="0.3"/>
  <rect x="42" y="162" width="116" height="21" rx="3" fill="#a1887f" opacity="0.5"/>
  
  <!-- Washing symbols -->
  <circle cx="50" cy="172" r="3" fill="#2196f3" opacity="0.6"/>
  <text x="48" y="175" font-family="Arial" font-size="4" fill="#fff">30°</text>
</svg>