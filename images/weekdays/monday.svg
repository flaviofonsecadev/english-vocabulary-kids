<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Fundo do calendário -->
  <rect x="40" y="40" width="120" height="120" rx="10" fill="#f0f0f0" stroke="#333" stroke-width="3"/>
  
  <!-- Cabeçalho do calendário -->
  <rect x="40" y="40" width="120" height="30" rx="10" fill="#ff6b6b" stroke="#333" stroke-width="3"/>
  
  <!-- Texto "MON" -->
  <text x="100" y="62" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff">MON</text>
  
  <!-- Número do dia -->
  <text x="100" y="110" font-family="Arial, sans-serif" font-size="40" font-weight="bold" text-anchor="middle" fill="#333">1</text>
  
  <!-- Indicador de "Primeiro dia da semana" -->
  <circle cx="100" cy="140" r="10" fill="#ff6b6b"/>
</svg>