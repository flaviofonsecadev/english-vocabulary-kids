<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Círculo de fundo para o ícone -->
    <circle cx="50" cy="50" r="48" fill="#FFC0CB" stroke="#FFB6C1" stroke-width="2"/>

    <!-- Fatia de Bolo -->
    <g id="cake-slice">
        <!-- Camada superior (cobertura) -->
        <path d="M 25 50 L 75 30 L 75 50 L 25 70 Z" fill="#FF69B4"/>
        
        <!-- Camada do meio (recheio) -->
        <path d="M 25 60 L 75 43 L 75 50 L 25 70 Z" fill="#FFFFFF"/>

        <!-- Camada inferior (bolo) -->
        <path d="M 25 70 L 75 50 L 75 65 L 25 85 Z" fill="#D2B48C"/>

        <!-- Sombra -->
        <polygon points="25,85 75,65 77,67 27,87" fill="#000000" opacity="0.1"/>
    </g>

    <!-- Vela no topo -->
    <g id="candle">
        <!-- Vela -->
        <rect x="48" y="20" width="4" height="15" fill="#FFFFFF" stroke="#FF0000" stroke-width="0.5"/>
        <!-- Chama -->
        <path d="M 50 20 Q 48 15, 50 10 Q 52 15, 50 20 Z" fill="#FFD700">
            <animate 
                attributeName="d" 
                values="M 50 20 Q 48 15, 50 10 Q 52 15, 50 20 Z; M 50 20 Q 49 14, 50 9 Q 51 14, 50 20 Z; M 50 20 Q 48 15, 50 10 Q 52 15, 50 20 Z" 
                dur="1s" 
                repeatCount="indefinite" />
        </path>
    </g>

    <!-- Morango no topo -->
    <g id="strawberry" transform="translate(65, 25)">
        <!-- Corpo do morango -->
        <path d="M 0 0 C -5 5, 5 5, 0 0 L -4 8 L 4 8 Z" fill="#FF4136"/>
        <!-- Folhas -->
        <path d="M 0 0 L -3 -3 L 0 -2 L 3 -3 Z" fill="#2E8B57"/>
    </g>

    <!-- Prato -->
    <ellipse cx="50" cy="85" rx="35" ry="8" fill="#F5F5F5" stroke="#DCDCDC" stroke-width="1"/>
</svg>