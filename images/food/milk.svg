<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Círculo de fundo para o ícone (fundo azul claro) -->
    <circle cx="50" cy="50" r="48" fill="#E0FFFF" stroke="#B0E0E6" stroke-width="2"/>

    <!-- Caixa de Leite -->
    <g id="milk-carton">
        <!-- Corpo da caixa -->
        <rect x="30" y="30" width="40" height="50" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
        
        <!-- Topo da caixa (triangular) -->
        <path d="M 30 30 L 50 15 L 70 30 Z" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
        
        <!-- Rótulo da caixa -->
        <rect x="35" y="40" width="30" height="30" fill="#87CEEB"/>
        <text x="50" y="60" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="bold">MILK</text>

        <!-- Sombra -->
        <rect x="70" y="30" width="5" height="50" fill="#000000" opacity="0.1"/>
    </g>

    <!-- Gota de leite caindo -->
    <g id="milk-drop">
        <path d="M 50 85 C 45 95, 55 95, 50 85 Z" fill="#FFFFFF">
            <animateTransform 
                attributeName="transform" 
                type="translate" 
                from="0 -70" 
                to="0 0" 
                dur="1.5s" 
                repeatCount="indefinite"/>
            <animate 
                attributeName="opacity" 
                values="1;0" 
                dur="1.5s" 
                repeatCount="indefinite"/>
        </path>
    </g>

    <!-- Vaca (opcional, para contexto) -->
    <g transform="translate(15, 65)">
        <!-- Corpo -->
        <ellipse cx="10" cy="10" rx="8" ry="5" fill="white" stroke="black" stroke-width="0.5"/>
        <!-- Cabeça -->
        <circle cx="18" cy="8" r="4" fill="white" stroke="black" stroke-width="0.5"/>
        <!-- Manchas -->
        <ellipse cx="8" cy="11" rx="2" ry="1" fill="black"/>
        <ellipse cx="13" cy="9" rx="2" ry="1" fill="black"/>
        <!-- Olho -->
        <circle cx="19" cy="7" r="0.5" fill="black"/>
    </g>

    <!-- Grama no fundo -->
    <rect x="0" y="80" width="100" height="20" fill="#90EE90"/>
    <path d="M 0 80 Q 10 75, 20 80 T 40 80 T 60 80 T 80 80 T 100 80" stroke="#3CB371" stroke-width="2" fill="none"/>
</svg>