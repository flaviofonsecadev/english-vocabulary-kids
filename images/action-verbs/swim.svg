<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#e1f5fe" stroke="#03a9f4" stroke-width="2"/>
  
  <!-- Water -->
  <rect x="10" y="120" width="180" height="70" fill="#4fc3f7" opacity="0.7"/>
  
  <!-- Water waves -->
  <path d="M10 120 Q30 115 50 120 T90 120 T130 120 T170 120 T190 120" stroke="#29b6f6" stroke-width="2" fill="none"/>
  <path d="M10 130 Q25 125 40 130 T70 130 T100 130 T130 130 T160 130 T190 130" stroke="#29b6f6" stroke-width="2" fill="none"/>
  <path d="M10 140 Q35 135 60 140 T110 140 T160 140 T190 140" stroke="#29b6f6" stroke-width="2" fill="none"/>
  
  <!-- Swimming person -->
  <!-- Head -->
  <circle cx="100" cy="110" r="12" fill="#ffdbcb" stroke="#333" stroke-width="2"/>
  
  <!-- Swimming goggles -->
  <ellipse cx="95" cy="108" rx="4" ry="3" fill="#333" opacity="0.8"/>
  <ellipse cx="105" cy="108" rx="4" ry="3" fill="#333" opacity="0.8"/>
  <path d="M91 108 Q100 105 109 108" stroke="#333" stroke-width="1.5" fill="none"/>
  
  <!-- Hair -->
  <path d="M88 100 Q100 95 112 100 Q112 105 100 110 Q88 105 88 100" fill="#8b4513"/>
  
  <!-- Body (horizontal swimming position) -->
  <ellipse cx="100" cy="125" rx="20" ry="8" fill="#f44336"/>
  
  <!-- Arms in swimming stroke -->
  <!-- Left arm (extended forward) -->
  <ellipse cx="75" cy="120" rx="15" ry="4" fill="#ffdbcb" transform="rotate(-10 75 120)"/>
  
  <!-- Right arm (pulling back) -->
  <ellipse cx="125" cy="130" rx="15" ry="4" fill="#ffdbcb" transform="rotate(15 125 130)"/>
  
  <!-- Legs kicking -->
  <!-- Left leg -->
  <ellipse cx="110" cy="140" rx="12" ry="4" fill="#ffdbcb" transform="rotate(5 110 140)"/>
  
  <!-- Right leg -->
  <ellipse cx="115" cy="150" rx="12" ry="4" fill="#ffdbcb" transform="rotate(-5 115 150)"/>
  
  <!-- Water splashes -->
  <circle cx="60" cy="115" r="3" fill="#81d4fa" opacity="0.6"/>
  <circle cx="65" cy="110" r="2" fill="#81d4fa" opacity="0.6"/>
  <circle cx="140" cy="125" r="3" fill="#81d4fa" opacity="0.6"/>
  <circle cx="145" cy="120" r="2" fill="#81d4fa" opacity="0.6"/>
  <circle cx="120" cy="155" r="2" fill="#81d4fa" opacity="0.6"/>
  <circle cx="125" cy="160" r="2" fill="#81d4fa" opacity="0.6"/>
  
  <!-- Bubbles -->
  <circle cx="85" cy="105" r="2" fill="#b3e5fc" opacity="0.8"/>
  <circle cx="90" cy="100" r="1.5" fill="#b3e5fc" opacity="0.8"/>
  <circle cx="95" cy="95" r="1" fill="#b3e5fc" opacity="0.8"/>
</svg>