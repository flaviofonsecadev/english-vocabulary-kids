<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
  
  <!-- Musical notes floating around -->
  <text x="40" y="40" font-family="Arial" font-size="20" fill="#9c27b0">♪</text>
  <text x="160" y="50" font-family="Arial" font-size="16" fill="#673ab7">♫</text>
  <text x="30" y="160" font-family="Arial" font-size="18" fill="#e91e63">♪</text>
  <text x="170" y="170" font-family="Arial" font-size="14" fill="#9c27b0">♫</text>
  
  <!-- Person dancing -->
  <!-- Head -->
  <circle cx="100" cy="55" r="15" fill="#ffdbcb" stroke="#333" stroke-width="2"/>
  
  <!-- Hair (flowing with movement) -->
  <path d="M85 43 Q95 38 110 45 Q118 50 115 58 Q105 55 100 60 Q90 55 85 43" fill="#8b4513"/>
  
  <!-- Eyes (happy) -->
  <path d="M92 52 Q95 49 98 52" stroke="#333" stroke-width="2" fill="none"/>
  <path d="M102 52 Q105 49 108 52" stroke="#333" stroke-width="2" fill="none"/>
  
  <!-- Mouth (smiling) -->
  <path d="M95 62 Q100 67 105 62" stroke="#333" stroke-width="2" fill="none"/>
  
  <!-- Body (tilted for dance pose) -->
  <ellipse cx="105" cy="85" rx="12" ry="20" fill="#e91e63" transform="rotate(15 105 85)"/>
  
  <!-- Left arm (raised up) -->
  <line x1="93" y1="75" x2="75" y2="60" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  <line x1="75" y1="60" x2="65" y2="45" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Right arm (extended to side) -->
  <line x1="117" y1="75" x2="140" y2="80" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  <line x1="140" y1="80" x2="155" y2="75" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Hands -->
  <circle cx="65" cy="45" r="4" fill="#ffdbcb"/>
  <circle cx="155" cy="75" r="4" fill="#ffdbcb"/>
  
  <!-- Dress/skirt (flowing) -->
  <path d="M93 100 Q100 110 107 100 Q115 115 125 120 Q120 130 110 125 Q100 135 90 125 Q80 130 75 120 Q85 115 93 100" fill="#f8bbd9"/>
  
  <!-- Left leg (in motion) -->
  <line x1="95" y1="120" x2="85" y2="145" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  <line x1="85" y1="145" x2="75" y2="165" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Right leg (lifted/bent) -->
  <line x1="105" y1="120" x2="120" y2="135" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  <line x1="120" y1="135" x2="125" y2="150" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Shoes -->
  <ellipse cx="73" cy="167" rx="8" ry="4" fill="#9c27b0"/>
  <ellipse cx="127" cy="152" rx="8" ry="4" fill="#9c27b0"/>
  
  <!-- Dance floor -->
  <ellipse cx="100" cy="180" rx="80" ry="15" fill="#e0e0e0" opacity="0.5"/>
  
  <!-- Motion lines -->
  <path d="M50 70 Q55 75 60 70" stroke="#9c27b0" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M140 90 Q145 95 150 90" stroke="#9c27b0" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M70 140 Q75 145 80 140" stroke="#e91e63" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Sparkles/stars for magical effect -->
  <text x="45" y="80" font-family="Arial" font-size="12" fill="#ffc107">✨</text>
  <text x="150" y="110" font-family="Arial" font-size="10" fill="#ffc107">✨</text>
  <text x="60" y="120" font-family="Arial" font-size="8" fill="#ffc107">✨</text>
</svg>