<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  
  <!-- Running person -->
  <!-- Head -->
  <circle cx="100" cy="60" r="15" fill="#ffdbcb" stroke="#333" stroke-width="2"/>
  
  <!-- Hair -->
  <path d="M85 50 Q100 45 115 50 Q115 55 100 60 Q85 55 85 50" fill="#8b4513"/>
  
  <!-- Eyes -->
  <circle cx="95" cy="58" r="2" fill="#333"/>
  <circle cx="105" cy="58" r="2" fill="#333"/>
  
  <!-- Mouth -->
  <path d="M95 65 Q100 68 105 65" stroke="#333" stroke-width="1.5" fill="none"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="90" rx="12" ry="20" fill="#4caf50"/>
  
  <!-- Arms in running position -->
  <!-- Left arm (back) -->
  <line x1="88" y1="80" x2="75" y2="95" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  <line x1="75" y1="95" x2="70" y2="110" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Right arm (forward) -->
  <line x1="112" y1="80" x2="125" y2="75" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  <line x1="125" y1="75" x2="135" y2="85" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Legs in running position -->
  <!-- Left leg (back, bent) -->
  <line x1="95" y1="110" x2="85" y2="130" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  <line x1="85" y1="130" x2="75" y2="120" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Right leg (forward, extended) -->
  <line x1="105" y1="110" x2="120" y2="140" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  <line x1="120" y1="140" x2="130" y2="155" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Shoes -->
  <ellipse cx="72" cy="122" rx="8" ry="4" fill="#333"/>
  <ellipse cx="132" cy="157" rx="8" ry="4" fill="#333"/>
  
  <!-- Motion lines -->
  <path d="M50 80 L60 80" stroke="#999" stroke-width="2" stroke-linecap="round"/>
  <path d="M45 90 L55 90" stroke="#999" stroke-width="2" stroke-linecap="round"/>
  <path d="M50 100 L60 100" stroke="#999" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Ground line -->
  <line x1="20" y1="170" x2="180" y2="170" stroke="#8bc34a" stroke-width="3"/>
</svg>