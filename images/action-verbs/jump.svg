<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  
  <!-- Jumping person -->
  <!-- Head -->
  <circle cx="100" cy="50" r="15" fill="#ffdbcb" stroke="#333" stroke-width="2"/>
  
  <!-- Hair -->
  <path d="M85 40 Q100 35 115 40 Q115 45 100 50 Q85 45 85 40" fill="#8b4513"/>
  
  <!-- Eyes -->
  <circle cx="95" cy="48" r="2" fill="#333"/>
  <circle cx="105" cy="48" r="2" fill="#333"/>
  
  <!-- Mouth (happy) -->
  <path d="M95 55 Q100 58 105 55" stroke="#333" stroke-width="1.5" fill="none"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="80" rx="12" ry="20" fill="#2196f3"/>
  
  <!-- Arms raised up -->
  <!-- Left arm -->
  <line x1="88" y1="70" x2="75" y2="50" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  <line x1="75" y1="50" x2="70" y2="35" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Right arm -->
  <line x1="112" y1="70" x2="125" y2="50" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  <line x1="125" y1="50" x2="130" y2="35" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Legs bent while jumping -->
  <!-- Left leg -->
  <line x1="95" y1="100" x2="85" y2="120" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  <line x1="85" y1="120" x2="80" y2="135" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Right leg -->
  <line x1="105" y1="100" x2="115" y2="120" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  <line x1="115" y1="120" x2="120" y2="135" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Shoes -->
  <ellipse cx="78" cy="137" rx="8" ry="4" fill="#333"/>
  <ellipse cx="122" cy="137" rx="8" ry="4" fill="#333"/>
  
  <!-- Motion lines showing upward movement -->
  <path d="M50 120 L60 110" stroke="#999" stroke-width="2" stroke-linecap="round"/>
  <path d="M45 130 L55 120" stroke="#999" stroke-width="2" stroke-linecap="round"/>
  <path d="M140 120 L150 110" stroke="#999" stroke-width="2" stroke-linecap="round"/>
  <path d="M145 130 L155 120" stroke="#999" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Ground line -->
  <line x1="20" y1="170" x2="180" y2="170" stroke="#8bc34a" stroke-width="3"/>
  
  <!-- Shadow on ground -->
  <ellipse cx="100" cy="168" rx="25" ry="5" fill="#ccc" opacity="0.5"/>
</svg>