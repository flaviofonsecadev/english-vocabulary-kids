<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#e8f5e8" stroke="#4caf50" stroke-width="2"/>
  
  <!-- Playing child -->
  <!-- Head -->
  <circle cx="100" cy="60" r="15" fill="#ffdbcb" stroke="#333" stroke-width="2"/>
  
  <!-- Hair -->
  <path d="M85 48 Q100 43 115 48 Q115 53 100 60 Q85 53 85 48" fill="#8b4513"/>
  
  <!-- Eyes (happy) -->
  <path d="M93 58 Q96 55 99 58" stroke="#333" stroke-width="2" fill="none"/>
  <path d="M101 58 Q104 55 107 58" stroke="#333" stroke-width="2" fill="none"/>
  
  <!-- Mouth (smiling) -->
  <path d="M95 65 Q100 70 105 65" stroke="#333" stroke-width="2" fill="none"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="90" rx="12" ry="20" fill="#ff9800"/>
  
  <!-- Arms playing with ball -->
  <!-- Left arm -->
  <line x1="88" y1="80" x2="70" y2="75" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  <line x1="70" y1="75" x2="60" y2="85" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Right arm -->
  <line x1="112" y1="80" x2="130" y2="75" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  <line x1="130" y1="75" x2="140" y2="85" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Ball being thrown/caught -->
  <circle cx="140" cy="85" r="8" fill="#f44336"/>
  <circle cx="142" cy="83" r="2" fill="#fff" opacity="0.7"/>
  
  <!-- Legs -->
  <line x1="95" y1="110" x2="90" y2="140" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  <line x1="90" y1="140" x2="85" y2="165" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  
  <line x1="105" y1="110" x2="110" y2="140" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  <line x1="110" y1="140" x2="115" y2="165" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Shoes -->
  <ellipse cx="83" cy="167" rx="8" ry="4" fill="#333"/>
  <ellipse cx="117" cy="167" rx="8" ry="4" fill="#333"/>
  
  <!-- Toys on ground -->
  <!-- Toy car -->
  <rect x="40" y="155" width="20" height="10" rx="2" fill="#2196f3"/>
  <circle cx="45" cy="162" r="3" fill="#333"/>
  <circle cx="55" cy="162" r="3" fill="#333"/>
  
  <!-- Building blocks -->
  <rect x="150" y="150" width="12" height="12" fill="#ff5722"/>
  <rect x="150" y="138" width="12" height="12" fill="#4caf50"/>
  <rect x="162" y="150" width="12" height="12" fill="#ffeb3b"/>
  
  <!-- Motion lines around ball -->
  <path d="M125 70 Q135 75 130 80" stroke="#999" stroke-width="1.5" fill="none"/>
  <path d="M145 70 Q155 75 150 80" stroke="#999" stroke-width="1.5" fill="none"/>
  
  <!-- Ground line -->
  <line x1="20" y1="175" x2="180" y2="175" stroke="#8bc34a" stroke-width="3"/>
</svg>