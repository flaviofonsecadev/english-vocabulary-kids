<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#fff8e1" stroke="#ffc107" stroke-width="2"/>
  
  <!-- Person eating -->
  <!-- Head -->
  <circle cx="100" cy="70" r="18" fill="#ffdbcb" stroke="#333" stroke-width="2"/>
  
  <!-- Hair -->
  <path d="M82 55 Q100 50 118 55 Q118 60 100 70 Q82 60 82 55" fill="#8b4513"/>
  
  <!-- Eyes -->
  <circle cx="93" cy="68" r="2" fill="#333"/>
  <circle cx="107" cy="68" r="2" fill="#333"/>
  
  <!-- Mouth (eating) -->
  <ellipse cx="100" cy="78" rx="4" ry="3" fill="#333"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="110" rx="15" ry="25" fill="#4caf50"/>
  
  <!-- Arms -->
  <!-- Left arm holding food -->
  <line x1="85" y1="95" x2="70" y2="85" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  <line x1="70" y1="85" x2="65" y2="70" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Right arm with fork/spoon -->
  <line x1="115" y1="95" x2="130" y2="80" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  <line x1="130" y1="80" x2="125" y2="65" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Food (sandwich) in left hand -->
  <rect x="55" y="65" width="15" height="8" rx="2" fill="#deb887"/>
  <rect x="56" y="67" width="13" height="2" fill="#ff6b6b"/>
  <rect x="56" y="69" width="13" height="1" fill="#4caf50"/>
  
  <!-- Fork in right hand -->
  <line x1="125" y1="65" x2="125" y2="55" stroke="#666" stroke-width="2"/>
  <line x1="123" y1="55" x2="123" y2="50" stroke="#666" stroke-width="1"/>
  <line x1="125" y1="55" x2="125" y2="50" stroke="#666" stroke-width="1"/>
  <line x1="127" y1="55" x2="127" y2="50" stroke="#666" stroke-width="1"/>
  
  <!-- Legs -->
  <line x1="92" y1="135" x2="85" y2="165" stroke="#ffdbcb" stroke-width="10" stroke-linecap="round"/>
  <line x1="108" y1="135" x2="115" y2="165" stroke="#ffdbcb" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Shoes -->
  <ellipse cx="83" cy="167" rx="10" ry="5" fill="#333"/>
  <ellipse cx="117" cy="167" rx="10" ry="5" fill="#333"/>
  
  <!-- Table -->
  <rect x="40" y="140" width="120" height="8" fill="#8d6e63"/>
  <line x1="50" y1="148" x2="50" y2="170" stroke="#8d6e63" stroke-width="6"/>
  <line x1="150" y1="148" x2="150" y2="170" stroke="#8d6e63" stroke-width="6"/>
  
  <!-- Plate on table -->
  <ellipse cx="100" cy="144" rx="20" ry="4" fill="#fff" stroke="#ddd" stroke-width="1"/>
  
  <!-- Food on plate -->
  <circle cx="95" cy="144" r="3" fill="#ff6b6b"/>
  <circle cx="105" cy="144" r="3" fill="#4caf50"/>
  <ellipse cx="100" cy="142" rx="8" ry="2" fill="#deb887"/>
</svg>