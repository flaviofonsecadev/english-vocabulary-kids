<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
  
  <!-- Person reading -->
  <!-- Head -->
  <circle cx="100" cy="65" r="15" fill="#ffdbcb" stroke="#333" stroke-width="2"/>
  
  <!-- Hair -->
  <path d="M85 53 Q100 48 115 53 Q115 58 100 65 Q85 58 85 53" fill="#8b4513"/>
  
  <!-- Eyes (focused on book) -->
  <circle cx="95" cy="63" r="2" fill="#333"/>
  <circle cx="105" cy="63" r="2" fill="#333"/>
  
  <!-- Mouth (concentrated) -->
  <line x1="98" y1="70" x2="102" y2="70" stroke="#333" stroke-width="1.5"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="95" rx="12" ry="20" fill="#673ab7"/>
  
  <!-- Arms holding book -->
  <!-- Left arm -->
  <line x1="88" y1="85" x2="75" y2="95" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  <line x1="75" y1="95" x2="70" y2="110" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Right arm -->
  <line x1="112" y1="85" x2="125" y2="95" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  <line x1="125" y1="95" x2="130" y2="110" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  
