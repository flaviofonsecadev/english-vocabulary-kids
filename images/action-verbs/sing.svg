<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  
  <!-- Musical notes floating around -->
  <text x="35" y="45" font-family="Arial" font-size="18" fill="#2196f3">♪</text>
  <text x="155" y="55" font-family="Arial" font-size="16" fill="#9c27b0">♫</text>
  <text x="25" y="120" font-family="Arial" font-size="20" fill="#ff5722">♪</text>
  <text x="165" y="130" font-family="Arial" font-size="14" fill="#4caf50">♫</text>
  <text x="50" y="180" font-family="Arial" font-size="16" fill="#673ab7">♪</text>
  <text x="150" y="185" font-family="Arial" font-size="18" fill="#e91e63">♫</text>
  
  <!-- Person singing -->
  <!-- Head -->
  <circle cx="100" cy="65" r="15" fill="#ffdbcb" stroke="#333" stroke-width="2"/>
  
  <!-- Hair -->
  <path d="M85 53 Q100 48 115 53 Q115 58 100 65 Q85 58 85 53" fill="#8b4513"/>
  
  <!-- Eyes (closed/squinting while singing) -->
  <path d="M92 62 Q95 59 98 62" stroke="#333" stroke-width="2" fill="none"/>
  <path d="M102 62 Q105 59 108 62" stroke="#333" stroke-width="2" fill="none"/>
  
  <!-- Mouth (open, singing) -->
  <ellipse cx="100" cy="70" rx="4" ry="6" fill="#333"/>
  
  <!-- Sound waves coming from mouth -->
  <path d="M115 70 Q125 65 130 70 Q125 75 115 70" stroke="#ff9800" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M120 70 Q135 60 145 70 Q135 80 120 70" stroke="#ff9800" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M125 70 Q145 55 160 70 Q145 85 125 70" stroke="#ff9800" stroke-width="2" fill="none" opacity="0.3"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="95" rx="12" ry="20" fill="#2196f3"/>
  
  <!-- Left arm (gesturing while singing) -->
  <line x1="88" y1="85" x2="70" y2="90" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  <line x1="70" y1="90" x2="60" y2="105" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Right arm (raised expressively) -->
  <line x1="112" y1="85" x2="130" y2="75" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  <line x1="130" y1="75" x2="140" y2="60" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Hands -->
  <circle cx="60" cy="105" r="4" fill="#ffdbcb"/>
  <circle cx="140" cy="60" r="4" fill="#ffdbcb"/>
  
  <!-- Legs -->
  <line x1="95" y1="115" x2="90" y2="145" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  <line x1="90" y1="145" x2="85" y2="170" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  
  <line x1="105" y1="115" x2="110" y2="145" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  <line x1="110" y1="145" x2="115" y2="170" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Shoes -->
  <ellipse cx="83" cy="172" rx="8" ry="4" fill="#333"/>
  <ellipse cx="117" cy="172" rx="8" ry="4" fill="#333"/>
  
  <!-- Microphone (optional) -->
  <rect x="55" y="100" width="3" height="15" fill="#666"/>
  <ellipse cx="56.5" cy="98" rx="4" ry="6" fill="#333"/>
  <circle cx="56.5" cy="98" r="3" fill="#666"/>
  
  <!-- Stage/platform -->
  <ellipse cx="100" cy="185" rx="70" ry="10" fill="#8d6e63" opacity="0.6"/>
  
  <!-- Spotlight effect -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#ffc107" stroke-width="2" opacity="0.3"/>
  <circle cx="100" cy="100" r="75" fill="none" stroke="#ffc107" stroke-width="1" opacity="0.2"/>
  
  <!-- Additional musical notes for atmosphere -->
  <text x="70" y="35" font-family="Arial" font-size="12" fill="#4caf50">♪</text>
  <text x="130" y="40" font-family="Arial" font-size="14" fill="#ff5722">♫</text>
  <text x="180" y="100" font-family="Arial" font-size="12" fill="#9c27b0">♪</text>
</svg>