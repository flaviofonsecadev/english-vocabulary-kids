<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f1f8e9" stroke="#689f38" stroke-width="2"/>
  
  <!-- Person writing -->
  <!-- Head -->
  <circle cx="100" cy="60" r="15" fill="#ffdbcb" stroke="#333" stroke-width="2"/>
  
  <!-- Hair -->
  <path d="M85 48 Q100 43 115 48 Q115 53 100 60 Q85 53 85 48" fill="#8b4513"/>
  
  <!-- Eyes (looking down at paper) -->
  <circle cx="95" cy="58" r="2" fill="#333"/>
  <circle cx="105" cy="58" r="2" fill="#333"/>
  
  <!-- Mouth (concentrated) -->
  <line x1="98" y1="65" x2="102" y2="65" stroke="#333" stroke-width="1.5"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="90" rx="12" ry="20" fill="#3f51b5"/>
  
  <!-- Left arm (supporting) -->
  <line x1="88" y1="80" x2="70" y2="90" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  <line x1="70" y1="90" x2="65" y2="110" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Right arm (writing) -->
  <line x1="112" y1="80" x2="125" y2="85" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  <line x1="125" y1="85" x2="135" y2="100" stroke="#ffdbcb" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Pencil in right hand -->
  <line x1="135" y1="100" x2="145" y2="110" stroke="#ffc107" stroke-width="4" stroke-linecap="round"/>
  <line x1="145" y1="110" x2="148" y2="113" stroke="#ff5722" stroke-width="3" stroke-linecap="round"/>
  <circle cx="135" cy="100" r="2" fill="#e91e63"/>
  
  <!-- Paper/notebook -->
  <rect x="70" y="110" width="60" height="45" rx="2" fill="#fff" stroke="#ddd" stroke-width="1"/>
  
  <!-- Lines on paper -->
  <line x1="75" y1="120" x2="125" y2="120" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="75" y1="125" x2="125" y2="125" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="75" y1="130" x2="125" y2="130" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="75" y1="135" x2="125" y2="135" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="75" y1="140" x2="125" y2="140" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="75" y1="145" x2="125" y2="145" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="75" y1="150" x2="125" y2="150" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- Written text (scribbles) -->
  <path d="M75 118 Q80 116 85 118 Q90 120 95 118" stroke="#333" stroke-width="1.5" fill="none"/>
  <path d="M75 123 Q85 121 95 123 Q105 125 115 123" stroke="#333" stroke-width="1.5" fill="none"/>
  <path d="M75 128 Q80 126 85 128 Q90 130 100 128" stroke="#333" stroke-width="1.5" fill="none"/>
  <path d="M75 133 Q90 131 105 133 Q115 135 125 133" stroke="#333" stroke-width="1.5" fill="none"/>
  
  <!-- Legs -->
  <line x1="95" y1="110" x2="90" y2="140" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  <line x1="90" y1="140" x2="85" y2="165" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  
  <line x1="105" y1="110" x2="110" y2="140" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  <line x1="110" y1="140" x2="115" y2="165" stroke="#ffdbcb" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Shoes -->
  <ellipse cx="83" cy="167" rx="8" ry="4" fill="#333"/>
  <ellipse cx="117" cy="167" rx="8" ry="4" fill="#333"/>
  
  <!-- Desk -->
  <rect x="50" y="155" width="100" height="8" fill="#8d6e63"/>
  <line x1="60" y1="163" x2="60" y2="180" stroke="#8d6e63" stroke-width="6"/>
  <line x1="140" y1="163" x2="140" y2="180" stroke="#8d6e63" stroke-width="6"/>
  
  <!-- Eraser on desk -->
  <rect x="140" y="150" width="8" height="4" rx="1" fill="#ff9800"/>
</svg>