<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Círculo de fundo para o ícone (céu azul) -->
    <circle cx="50" cy="50" r="48" fill="#87CEEB" stroke="#4682B4" stroke-width="2"/>

    <!-- Nuvem Principal -->
    <g id="cloud">
        <!-- Base da nuvem -->
        <path d="M 25 70 H 75" stroke="#FFFFFF" stroke-width="0" fill="#FFFFFF"/>
        
        <!-- Círculos que formam a nuvem -->
        <circle cx="35" cy="60" r="15" fill="#FFFFFF"/>
        <circle cx="50" cy="55" r="20" fill="#FFFFFF"/>
        <circle cx="65" cy="60" r="15" fill="#FFFFFF"/>
        
        <!-- Animação de movimento suave -->
        <animateTransform 
            attributeName="transform"
            type="translate"
            values="-5 0; 5 0; -5 0"
            dur="5s"
            repeatCount="indefinite"
        />
    </g>

    <!-- Sombra da Nuvem -->
    <g id="cloud-shadow" transform="translate(2, 2)" opacity="0.2">
        <path d="M 25 70 H 75" stroke="#000000" stroke-width="0" fill="#000000"/>
        <circle cx="35" cy="60" r="15" fill="#000000"/>
        <circle cx="50" cy="55" r="20" fill="#000000"/>
        <circle cx="65" cy="60" r="15" fill="#000000"/>
        
        <animateTransform 
            attributeName="transform"
            type="translate"
            values="-3 2; 7 2; -3 2"
            dur="5s"
            repeatCount="indefinite"
        />
    </g>

    <!-- Gotas de Chuva (opcional, para nuvem de chuva) -->
    <g id="rain" fill="#4682B4">
        <!-- Gota 1 -->
        <path d="M 40 80 L 38 85 L 42 85 Z">
            <animate 
                attributeName="transform"
                type="translate"
                values="0 0; 0 10; 0 0"
                dur="1s"
                repeatCount="indefinite"
                begin="0s"
            />
            <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite" begin="0s"/>
        </path>
        <!-- Gota 2 -->
        <path d="M 50 85 L 48 90 L 52 90 Z">
            <animate 
                attributeName="transform"
                type="translate"
                values="0 0; 0 10; 0 0"
                dur="1s"
                repeatCount="indefinite"
                begin="0.3s"
            />
            <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite" begin="0.3s"/>
        </path>
        <!-- Gota 3 -->
        <path d="M 60 80 L 58 85 L 62 85 Z">
            <animate 
                attributeName="transform"
                type="translate"
                values="0 0; 0 10; 0 0"
                dur="1s"
                repeatCount="indefinite"
                begin="0.6s"
            />
            <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite" begin="0.6s"/>
        </path>
    </g>

    <!-- Sol parcial (atrás da nuvem) -->
    <circle cx="75" cy="35" r="15" fill="#FFD700" opacity="0.8"/>
</svg>