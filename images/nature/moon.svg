<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Círculo de fundo para o ícone (noite) -->
    <circle cx="50" cy="50" r="48" fill="#000033" stroke="#00001a" stroke-width="2"/>

    <!-- Lua Crescente -->
    <path d="M 50 10 A 40 40 0 1 0 50 90 A 30 30 0 1 1 50 10 Z" fill="#F0E68C">
        <!-- Animação de brilho sutil -->
        <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite" />
    </path>

    <!-- Cratera 1 -->
    <circle cx="60" cy="30" r="5" fill="#D2B48C" opacity="0.6"/>
    <!-- Cratera 2 -->
    <circle cx="75" cy="50" r="8" fill="#D2B48C" opacity="0.5"/>
    <!-- Cratera 3 -->
    <circle cx="65" cy="70" r="4" fill="#D2B48C" opacity="0.7"/>

    <!-- Estrelas (com animação de piscar) -->
    <g>
        <!-- Estrela 1 -->
        <circle cx="20" cy="25" r="1.5" fill="white">
            <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="0s"/>
        </circle>
        <!-- Estrela 2 -->
        <circle cx="80" cy="20" r="1" fill="white">
            <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="0.5s"/>
        </circle>
        <!-- Estrela 3 -->
        <circle cx="30" cy="70" r="1.2" fill="white">
            <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="1s"/>
        </circle>
        <!-- Estrela 4 -->
        <circle cx="85" cy="80" r="1.8" fill="white">
            <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="1.5s"/>
        </circle>
        <!-- Estrela 5 -->
        <circle cx="15" cy="50" r="1" fill="white">
            <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="0.2s"/>
        </circle>
    </g>

    <!-- Nuvem passando (opcional) -->
    <path d="M -20 80 Q 0 70 20 75 T 60 80 T 100 75" fill="#FFFFFF" opacity="0.1">
        <animateTransform attributeName="transform" type="translate" from="0 0" to="120 0" dur="15s" repeatCount="indefinite" />
    </path>

    <!-- Silhueta de uma coruja (opcional) -->
    <g transform="translate(10, 80)">
        <path d="M 0 0 C 2 0, 3 -3, 5 -3 C 7 -3, 8 0, 10 0" fill="#333"/>
        <path d="M 2 -5 Q 5 -8 8 -5" stroke="#333" stroke-width="1" fill="none"/>
        <circle cx="3.5" cy="-1.5" r="1" fill="yellow"/>
        <circle cx="6.5" cy="-1.5" r="1" fill="yellow"/>
    </g>
</svg>