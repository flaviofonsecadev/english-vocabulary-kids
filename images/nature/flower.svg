<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
  
  <!-- Flower -->
  <!-- Stem -->
  <rect x="97" y="100" width="6" height="70" fill="#4caf50"/>
  
  <!-- Stem texture -->
  <line x1="98" y1="105" x2="98" y2="165" stroke="#388e3c" stroke-width="1"/>
  <line x1="102" y1="105" x2="102" y2="165" stroke="#388e3c" stroke-width="1"/>
  
  <!-- Leaves -->
  <path d="M103 130 C120 120 130 140 103 150" fill="#66bb6a"/>
  <path d="M97 130 C80 120 70 140 97 150" fill="#66bb6a"/>
  
  <!-- Leaf veins -->
  <path d="M103 140 C110 135 115 140 103 145" stroke="#388e3c" stroke-width="0.5" fill="none"/>
  <path d="M97 140 C90 135 85 140 97 145" stroke="#388e3c" stroke-width="0.5" fill="none"/>
  
  <!-- Petals -->
  <ellipse cx="100" cy="70" rx="20" ry="30" fill="#ff4081"/>
  <ellipse cx="130" cy="90" rx="30" ry="20" fill="#ff4081" transform="rotate(45 130 90)"/>
  <ellipse cx="70" cy="90" rx="30" ry="20" fill="#ff4081" transform="rotate(-45 70 90)"/>
  <ellipse cx="120" cy="115" rx="20" ry="30" fill="#ff4081" transform="rotate(75 120 115)"/>
  <ellipse cx="80" cy="115" rx="20" ry="30" fill="#ff4081" transform="rotate(-75 80 115)"/>
  
  <!-- Center of the flower -->
  <circle cx="100" cy="100" r="20" fill="#ffeb3b"/>
  
  <!-- Center texture -->
  <circle cx="95" cy="95" r="1" fill="#f57c00"/>
  <circle cx="105" cy="95" r="1" fill="#f57c00"/>
  <circle cx="100" cy="100" r="1" fill="#f57c00"/>
  <circle cx="95" cy="105" r="1" fill="#f57c00"/>
  <circle cx="105" cy="105" r="1" fill="#f57c00"/>
  <circle cx="98" cy="98" r="1" fill="#f57c00"/>
  <circle cx="102" cy="98" r="1" fill="#f57c00"/>
  <circle cx="98" cy="102" r="1" fill="#f57c00"/>
  <circle cx="102" cy="102" r="1" fill="#f57c00"/>
  
  <!-- Dew drops -->
  <circle cx="115" cy="75" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="80" cy="80" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="100" cy="110" r="1" fill="#fff" opacity="0.5"/>
  
  <!-- Insects -->
  <!-- Bee -->
  <ellipse cx="50" cy="70" rx="5" ry="3" fill="#ffeb3b"/>
  <rect x="48" y="68" width="4" height="4" fill="#333"/>
  <ellipse cx="46" cy="68" rx="1" ry="2" fill="#fff" opacity="0.8"/>
  <ellipse cx="54" cy="68" rx="1" ry="2" fill="#fff" opacity="0.8"/>
  <circle cx="52" cy="70" r="0.5" fill="#333"/>
  
  <!-- Ladybug -->
  <circle cx="150" cy="140" r="4" fill="#f44336"/>
  <circle cx="150" cy="138" r="1" fill="#333"/>
  <circle cx="148" cy="140" r="0.5" fill="#333"/>
  <circle cx="152" cy="140" r="0.5" fill="#333"/>
  <circle cx="150" cy="142" r="0.5" fill="#333"/>
  
  <!-- Butterfly -->
  <ellipse cx="160" cy="60" rx="4" ry="3" fill="#3f51b5"/>
  <ellipse cx="166" cy="60" rx="4" ry="3" fill="#3f51b5"/>
  <line x1="163" y1="58" x2="163" y2="62" stroke="#333" stroke-width="0.5"/>
  <circle cx="163" cy="58" r="0.5" fill="#333"/>
  
  <!-- Grass -->
  <ellipse cx="100" cy="175" rx="40" ry="8" fill="#8bc34a"/>
  
  <!-- Grass blades -->
  <path d="M60 175 L60 170" stroke="#388e3c" stroke-width="1"/>
  <path d="M65 175 L65 168" stroke="#388e3c" stroke-width="1"/>
  <path d="M70 175 L70 172" stroke="#388e3c" stroke-width="1"/>
  <path d="M75 175 L75 169" stroke="#388e3c" stroke-width="1"/>
  <path d="M80 175 L80 171" stroke="#388e3c" stroke-width="1"/>
  <path d="M85 175 L85 170" stroke="#388e3c" stroke-width="1"/>
  <path d="M90 175 L90 172" stroke="#388e3c" stroke-width="1"/>
  <path d="M95 175 L95 168" stroke="#388e3c" stroke-width="1"/>
  <path d="M105 175 L105 168" stroke="#388e3c" stroke-width="1"/>
  <path d="M110 175 L110 172" stroke="#388e3c" stroke-width="1"/>
  <path d="M115 175 L115 170" stroke="#388e3c" stroke-width="1"/>
  <path d="M120 175 L120 171" stroke="#388e3c" stroke-width="1"/>
  <path d="M125 175 L125 169" stroke="#388e3c" stroke-width="1"/>
  <path d="M130 175 L130 172" stroke="#388e3c" stroke-width="1"/>
  <path d="M135 175 L135 168" stroke="#388e3c" stroke-width="1"/>
  <path d="M140 175 L140 170" stroke="#388e3c" stroke-width="1"/>
  
  <!-- Small flowers in grass -->
  <circle cx="65" cy="170" r="1.5" fill="#ffeb3b"/>
  <circle cx="135" cy="170" r="1.5" fill="#ffeb3b"/>
  <circle cx="80" cy="172" r="1" fill="#f48fb1"/>
  <circle cx="120" cy="172" r="1" fill="#f48fb1"/>
</svg>