<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Círculo de fundo para o ícone -->
    <circle cx="50" cy="50" r="48" fill="#87CEEB" stroke="#4682B4" stroke-width="2"/>

    <!-- Sol (corpo principal) -->
    <circle cx="50" cy="50" r="25" fill="#FFD700">
        <!-- Animação de pulsação -->
        <animate attributeName="r" values="25;27;25" dur="2s" repeatCount="indefinite" />
    </circle>

    <!-- Raios do Sol (com animação de rotação) -->
    <g transform="translate(50,50)">
        <defs>
            <path id="ray" d="M 0 -28 L 5 -38 L -5 -38 Z" fill="#FFD700" />
        </defs>
        
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="10s" repeatCount="indefinite" />

        <!-- Raios -->
        <use href="#ray" transform="rotate(0)"/>
        <use href="#ray" transform="rotate(45)"/>
        <use href="#ray" transform="rotate(90)"/>
        <use href="#ray" transform="rotate(135)"/>
        <use href="#ray" transform="rotate(180)"/>
        <use href="#ray" transform="rotate(225)"/>
        <use href="#ray" transform="rotate(270)"/>
        <use href="#ray" transform="rotate(315)"/>
    </g>

    <!-- Rosto do Sol -->
    <g transform="translate(50, 50)">
        <!-- Olhos -->
        <circle cx="-8" cy="-5" r="2" fill="black" />
        <circle cx="8" cy="-5" r="2" fill="black" />

        <!-- Sorriso -->
        <path d="M -10 5 Q 0 15 10 5" stroke="black" stroke-width="1.5" fill="none" />
    </g>

    <!-- Nuvens (para contexto) -->
    <g>
        <!-- Nuvem 1 -->
        <path d="M 20 80 Q 30 70 45 75 T 60 80 Z" fill="white" opacity="0.9" />
        <path d="M 15 85 Q 25 75 40 80 T 55 85 Z" fill="white" opacity="0.8" />

        <!-- Nuvem 2 -->
        <path d="M 70 30 Q 80 20 95 25 T 110 30 Z" fill="white" opacity="0.9" />
        <path d="M 65 35 Q 75 25 90 30 T 105 35 Z" fill="white" opacity="0.8" />
    </g>

    <!-- Pássaros (silhuetas) -->
    <g fill="#444">
        <path d="M 80 70 C 82 68, 85 68, 87 70" stroke="#444" stroke-width="1" fill="none" />
        <path d="M 85 75 C 87 73, 90 73, 92 75" stroke="#444" stroke-width="1" fill="none" />
    </g>
</svg>