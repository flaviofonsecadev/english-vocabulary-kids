<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#e8f5e8" stroke="#4caf50" stroke-width="2"/>
  
  <!-- Tree -->
  <!-- Trunk -->
  <rect x="90" y="120" width="20" height="50" fill="#8d6e63"/>
  
  <!-- Trunk texture -->
  <line x1="92" y1="125" x2="92" y2="165" stroke="#6d4c41" stroke-width="1"/>
  <line x1="96" y1="125" x2="96" y2="165" stroke="#6d4c41" stroke-width="1"/>
  <line x1="100" y1="125" x2="100" y2="165" stroke="#6d4c41" stroke-width="1"/>
  <line x1="104" y1="125" x2="104" y2="165" stroke="#6d4c41" stroke-width="1"/>
  <line x1="108" y1="125" x2="108" y2="165" stroke="#6d4c41" stroke-width="1"/>
  
  <!-- Tree rings -->
  <ellipse cx="100" cy="135" rx="8" ry="2" stroke="#6d4c41" stroke-width="0.5" fill="none"/>
  <ellipse cx="100" cy="145" rx="6" ry="1.5" stroke="#6d4c41" stroke-width="0.5" fill="none"/>
  <ellipse cx="100" cy="155" rx="4" ry="1" stroke="#6d4c41" stroke-width="0.5" fill="none"/>
  
  <!-- Crown/Leaves -->
  <circle cx="100" cy="90" r="35" fill="#4caf50"/>
  <circle cx="85" cy="85" r="25" fill="#66bb6a"/>
  <circle cx="115" cy="85" r="25" fill="#66bb6a"/>
  <circle cx="100" cy="70" r="20" fill="#81c784"/>
  
  <!-- Leaf details -->
  <!-- Individual leaves -->
  <ellipse cx="80" cy="80" rx="4" ry="2" fill="#388e3c" transform="rotate(-30 80 80)"/>
  <ellipse cx="120" cy="80" rx="4" ry="2" fill="#388e3c" transform="rotate(30 120 80)"/>
  <ellipse cx="90" cy="65" rx="4" ry="2" fill="#388e3c" transform="rotate(-45 90 65)"/>
  <ellipse cx="110" cy="65" rx="4" ry="2" fill="#388e3c" transform="rotate(45 110 65)"/>
  <ellipse cx="75" cy="95" rx="4" ry="2" fill="#388e3c" transform="rotate(-60 75 95)"/>
  <ellipse cx="125" cy="95" rx="4" ry="2" fill="#388e3c" transform="rotate(60 125 95)"/>
  
  <!-- Branches -->
  <line x1="95" y1="110" x2="80" y2="95" stroke="#8d6e63" stroke-width="3"/>
  <line x1="105" y1="110" x2="120" y2="95" stroke="#8d6e63" stroke-width="3"/>
  <line x1="100" y1="105" x2="100" y2="85" stroke="#8d6e63" stroke-width="2"/>
  
  <!-- Fruits (apples) -->
  <circle cx="85" cy="90" r="4" fill="#f44336"/>
  <circle cx="115" cy="90" r="4" fill="#f44336"/>
  <circle cx="100" cy="75" r="3" fill="#f44336"/>
  <circle cx="90" cy="100" r="3" fill="#f44336"/>
  <circle cx="110" cy="100" r="3" fill="#f44336"/>
  
  <!-- Fruit stems -->
  <line x1="85" y1="86" x2="85" y2="84" stroke="#388e3c" stroke-width="1"/>
  <line x1="115" y1="86" x2="115" y2="84" stroke="#388e3c" stroke-width="1"/>
  <line x1="100" y1="72" x2="100" y2="70" stroke="#388e3c" stroke-width="1"/>
  <line x1="90" y1="97" x2="90" y2="95" stroke="#388e3c" stroke-width="1"/>
  <line x1="110" y1="97" x2="110" y2="95" stroke="#388e3c" stroke-width="1"/>
  
  <!-- Small leaves on fruits -->
  <ellipse cx="87" cy="84" rx="2" ry="1" fill="#4caf50" transform="rotate(-20 87 84)"/>
  <ellipse cx="113" cy="84" rx="2" ry="1" fill="#4caf50" transform="rotate(20 113 84)"/>
  <ellipse cx="98" cy="70" rx="2" ry="1" fill="#4caf50" transform="rotate(-10 98 70)"/>
  <ellipse cx="88" cy="95" rx="2" ry="1" fill="#4caf50" transform="rotate(-15 88 95)"/>
  <ellipse cx="112" cy="95" rx="2" ry="1" fill="#4caf50" transform="rotate(15 112 95)"/>
  
  <!-- Birds in tree -->
  <ellipse cx="75" cy="70" rx="3" ry="2" fill="#3f51b5"/>
  <circle cx="74" cy="69" r="0.5" fill="#fff"/>
  <line x1="73" y1="70" x2="77" y2="70" stroke="#333" stroke-width="0.5"/>
  
  <ellipse cx="125" cy="75" rx="3" ry="2" fill="#3f51b5"/>
  <circle cx="124" cy="74" r="0.5" fill="#fff"/>
  <line x1="123" y1="75" x2="127" y2="75" stroke="#333" stroke-width="0.5"/>
  
  <!-- Bird nest -->
  <ellipse cx="100" cy="85" rx="6" ry="3" fill="#8d6e63"/>
  <ellipse cx="100" cy="84" rx="4" ry="2" fill="#6d4c41"/>
  
  <!-- Nest with eggs -->
  <ellipse cx="98" cy="84" rx="1.5" ry="2" fill="#fff"/>
  <ellipse cx="102" cy="84" rx="1.5" ry="2" fill="#fff"/>
  <circle cx="98" cy="84" r="0.5" fill="#ffeb3b"/>
  <circle cx="102" cy="84" r="0.5" fill="#ffeb3b"/>
  
  <!-- Roots (visible above ground) -->
  <path d="M85 170 Q80 175 75 180" stroke="#8d6e63" stroke-width="2" fill="none"/>
  <path d="M115 170 Q120 175 125 180" stroke="#8d6e63" stroke-width="2" fill="none"/>
  <path d="M90 170 Q85 180 80 185" stroke="#8d6e63" stroke-width="1.5" fill="none"/>
  <path d="M110 170 Q115 180 120 185" stroke="#8d6e63" stroke-width="1.5" fill="none"/>
  
  <!-- Grass around tree -->
  <ellipse cx="100" cy="175" rx="30" ry="8" fill="#8bc34a"/>
  
  <!-- Grass blades -->
  <path d="M70 175 L70 170" stroke="#388e3c" stroke-width="1"/>
  <path d="M75 175 L75 168" stroke="#388e3c" stroke-width="1"/>
  <path d="M80 175 L80 172" stroke="#388e3c" stroke-width="1"/>
  <path d="M85 175 L85 169" stroke="#388e3c" stroke-width="1"/>
  <path d="M90 175 L90 171" stroke="#388e3c" stroke-width="1"/>
  <path d="M95 175 L95 170" stroke="#388e3c" stroke-width="1"/>
  <path d="M105 175 L105 170" stroke="#388e3c" stroke-width="1"/>
  <path d="M110 175 L110 171" stroke="#388e3c" stroke-width="1"/>
  <path d="M115 175 L115 169" stroke="#388e3c" stroke-width="1"/>
  <path d="M120 175 L120 172" stroke="#388e3c" stroke-width="1"/>
  <path d="M125 175 L125 168" stroke="#388e3c" stroke-width="1"/>
  <path d="M130 175 L130 170" stroke="#388e3c" stroke-width="1"/>
  
  <!-- Flowers in grass -->
  <circle cx="70" cy="170" r="1.5" fill="#ffeb3b"/>
  <circle cx="130" cy="170" r="1.5" fill="#ffeb3b"/>
  <circle cx="85" cy="172" r="1" fill="#f48fb1"/>
  <circle cx="115" cy="172" r="1" fill="#f48fb1"/>
  
  <!-- Small insects -->
  <circle cx="75" cy="168" r="0.8" fill="#f44336"/>
  <ellipse cx="125" cy="168" rx="1" ry="0.5" fill="#3f51b5"/>
  
  <!-- Ant trail -->
  <path d="M60 180 Q65 178 70 180 Q75 182 80 180" stroke="#8d6e63" stroke-width="0.5" fill="none"/>
  
  <!-- Sunlight filtering through leaves -->
  <circle cx="60" cy="60" r="8" fill="#ffeb3b" opacity="0.3"/>
  <circle cx="140" cy="65" r="6" fill="#ffeb3b" opacity="0.3"/>
  <circle cx="55" cy="90" r="4" fill="#ffeb3b" opacity="0.2"/>
  <circle cx="145" cy="85" r="4" fill="#ffeb3b" opacity="0.2"/>
</svg>