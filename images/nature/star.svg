<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Círculo de fundo para o ícone (céu noturno) -->
    <circle cx="50" cy="50" r="48" fill="#000033" stroke="#00001a" stroke-width="2"/>

    <!-- Estrela Principal (com 5 pontas) -->
    <polygon points="50,10 61.8,38.2 90.2,38.2 68.2,56.8 79,85 50,68 21,85 31.8,56.8 9.8,38.2 38.2,38.2" fill="#FFD700">
        <!-- Animação de brilho -->
        <animateTransform 
            attributeName="transform"
            type="scale"
            values="1;1.1;1" 
            dur="2s"
            repeatCount="indefinite"
            additive="sum"
            accumulate="none"
        />
    </polygon>

    <!-- Brilho exterior (efeito de aura) -->
    <polygon points="50,10 61.8,38.2 90.2,38.2 68.2,56.8 79,85 50,68 21,85 31.8,56.8 9.8,38.2 38.2,38.2" fill="#FFFF00" opacity="0.5" filter="url(#blur-effect)">
        <animate 
            attributeName="opacity"
            values="0.5;0.8;0.5"
            dur="2s"
            repeatCount="indefinite"
        />
    </polygon>

    <!-- Outras estrelas menores (fundo) -->
    <g>
        <!-- Estrela 1 -->
        <circle cx="20" cy="25" r="1.5" fill="white">
            <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="0.2s"/>
        </circle>
        <!-- Estrela 2 -->
        <circle cx="80" cy="20" r="1" fill="white">
            <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="0.7s"/>
        </circle>
        <!-- Estrela 3 -->
        <circle cx="30" cy="70" r="1.2" fill="white">
            <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="1.2s"/>
        </circle>
        <!-- Estrela 4 -->
        <circle cx="85" cy="80" r="1.8" fill="white">
            <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="1.7s"/>
        </circle>
    </g>

    <!-- Definição do filtro de desfoque -->
    <defs>
        <filter id="blur-effect">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
        </filter>
    </defs>

    <!-- Cauda de cometa (opcional) -->
    <path d="M 10 10 L 30 30 Q 40 20 50 10" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.7">
        <animateTransform 
            attributeName="transform"
            type="translate"
            from="0 0"
            to="80 80"
            dur="5s"
            repeatCount="indefinite"
        />
    </path>
</svg>